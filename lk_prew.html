<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в личный кабинет — Подготовка к ЕГЭ по информатике</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
</head>
<body>    
    <div class="sidebar">
        <ul>
            <li><a href="lk_prew.html" class="active"><span>👤</span> <span>Личный кабинет</span></a></li>
            <li><a href="index.html"><span>🏠</span> <span>Главная</span></a></li>
            <li><a href="info.html"><span>ℹ️</span> <span>Дополнительно</span></a></li>
            <li><a href="contacts.html"><span>📞</span> <span>Контакты</span></a></li>
        </ul>
    </div>
    
    <div class="head-block">
        <div class="logo" id="logoContainer">
            <img src="logo.png" alt="Логотип" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'40\' height=\'40\' viewBox=\'0 0 24 24\'><circle cx=\'12\' cy=\'12\' r=\'12\' fill=\'%231e293b\'/><text x=\'6\' y=\'18\' font-family=\'Inter\' font-size=\'14\' fill=\'white\'>ЕГЭ</text></svg>'">
        </div>
        <h1>Личный кабинет</h1>
    </div>
    
    <div id="login-section">
        <div class="login-container">
            <div class="login-header">
                <h3>Вход в аккаунт</h3>
            </div>
            
            <div class="login-card">
                <div class="login-form">
                    <div class="form-group">
                        <label for="username">Имя пользователя</label>
                        <input type="text" id="username" >
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password">
                    </div>
                    
                    <button class="login-btn" onclick="login()">Войти в кабинет</button>
                    
                    <div class="error-message" id="errorMessage">Неверный логин или пароль. Попробуйте снова.</div>
                    <div class="success-message" id="successMessage">Успешный вход!</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            if (username === '') {
                errorMessage.textContent = 'Пожалуйста, введите имя пользователя';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (password === '') {
                errorMessage.textContent = 'Пожалуйста, введите пароль';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (password === 'M852pt71!' && username === 'Михаил') {
                successMessage.textContent = '✅ Успешный вход! Перенаправление в кабинет ученика...';
                successMessage.style.display = 'block';
                
                localStorage.setItem('currentUser', JSON.stringify({
                    name: username,
                    role: 'student'
                }));
                
                setTimeout(() => {
                    window.location.href = 'lk.html';
                }, 1500);
                
            } else if (password === 'A@123456' && username === 'Александр') {
                successMessage.textContent = '✅ Успешный вход! Перенаправление в кабинет преподавателя...';
                successMessage.style.display = 'block';
                
                localStorage.setItem('currentUser', JSON.stringify({
                    name: username,
                    role: 'teacher'
                }));
               
                setTimeout(() => {
                    window.location.href = 'lk_prepod.html';
                }, 1500);
                
            } else {
                errorMessage.style.display = 'block';
            }
        }
        
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
